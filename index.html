<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #F5F4F0;
  --card:    #FFFFFF;
  --border:  #E2E1DC;
  --border2: #CCCBC5;
  --text:    #111110;
  --t2:      #65655F;
  --t3:      #A5A59E;

  --green:   #15803D;
  --amber:   #B45309;
  --red:     #B91C1C;
  --purple:  #4F46E5;
  --blue:    #1D6FA8;

  --r: 8px;
  --r-sm: 5px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 0;
  height: 48px;
  padding: 0 24px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

#app-name {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  margin-right: 32px;
  white-space: nowrap;
}

#top-nav {
  display: flex;
  height: 100%;
  gap: 2px;
  flex: 1;
}

.nav-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  height: 100%;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 500;
  color: var(--t2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-family: inherit;
  transition: color 0.12s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.on { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

.nav-tab-add {
  margin-left: auto;
  padding: 0 16px;
  height: 30px;
  border-radius: var(--r-sm);
  background: var(--text);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
